<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UniStore</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header>
    <div class="logo">UNI<span>STORE</span></div>
    <div class="header-right">
      <div class="api-bar">
        <span class="api-label">API</span>
        <input id="apiBase" value="http://localhost:8000" spellcheck="false"/>
        <button onclick="iniciar()">Recargar</button>
      </div>
      <button class="cart-btn" onclick="toggleCarrito()">
        🛒 Carrito <span id="cart-count" class="cart-count">0</span>
      </button>
    </div>
  </header>

  <main>
    <div class="page-title">
      <h1>Catálogo</h1>
      <div class="filters">
        <button class="f-btn active" onclick="filtrar('todos',this)">Todos</button>
        <button class="f-btn" onclick="filtrar('disponible',this)">Disponibles</button>
        <button class="f-btn" onclick="filtrar('agotado',this)">Agotados</button>
      </div>
    </div>

    <div id="status" class="status"></div>
    <div id="grid" class="grid"></div>
  </main>

  <!-- PANEL CARRITO -->
  <div id="overlay" class="overlay" onclick="toggleCarrito()"></div>
  <aside id="carrito" class="carrito">
    <div class="carrito-header">
      <h2>Tu carrito</h2>
      <button class="close-btn" onclick="toggleCarrito()">✕</button>
    </div>
    <div id="carrito-items" class="carrito-items"></div>
    <div class="carrito-footer">
      <div class="total-row">
        <span>Total</span>
        <span id="total" class="total-price">$ 0</span>
      </div>
      <button class="btn-checkout" onclick="checkout()">Finalizar compra</button>
    </div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
