<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tienda — Productos</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<header>
  <div class="brand">
    <h1>uni<span>store</span></h1>
    <p>Catálogo de productos</p>
  </div>
  <div class="config-bar">
    <label>API</label>
    <input id="apiUrl" type="text" value="http://localhost:8000/productos" spellcheck="false"/>
    <button onclick="cargarProductos()">Conectar</button>
  </div>
</header>

<main>
  <div class="toolbar">
    <h2>Productos <em id="contador"></em></h2>
    <div class="filters">
      <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
      <button class="filter-btn" onclick="filtrar('disponible', this)">Disponibles</button>
      <button class="filter-btn" onclick="filtrar('agotado', this)">No disponibles</button>
    </div>
  </div>

  <div id="status" class="status loading">
    <span class="dot"></span>
    <span id="statusMsg">Conectando con la API...</span>
  </div>

  <div class="grid" id="grid"></div>
</main>

<script src="script.js"></script>
</body>
</html>
